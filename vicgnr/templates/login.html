{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<h1>Login</h1>
<form method="post" class="card form-grid">
  <label>
    Username
    <input type="text" name="username" required maxlength="64">
  </label>

  <label>
    Password
    <input type="password" name="password" required>
  </label>

  <button type="submit">Login</button>
</form>
{% endblock %}
